<html>

<head>
  <title>Termfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap"
    rel="stylesheet">
</head>

<body>
  <style>
    :root {
      --black: Black;
      --green: LimeGreen;
      --red: Red;
      --blue: DeepSkyBlue;
      --yellow: Gold;
      --magenta: Orchid;
      --cyan: DarkTurquoise;

      --purple: MediumSlateBlue;
      --orange: OrangeRed;
      --dblue: DodgerBlue;
    }

    * {
      font-family: "IBM Plex Mono";
      font-size: 18;
      background: var(--black);
      color: white;
      /* text-shadow: 0px 5px 10px currentColor; */
    }

    body {
      margin: 25px;
    }

    input {
      outline: none;
      border: none;
      width: 460px;
    }

    form {
      display: inline-block;
      margin-right: 10px;
      margin-bottom: 0px;
      caret-color: var(--green);
      font-weight: 500;
      caret-shape: block;
    }

    .semibold {
      font-weight: 500;
    }

    .rd {
      color: var(--red);
    }

    .grn {
      color: var(--green);
    }

    .ylw {
      color: var(--yellow);
    }

    .blu {
      color: var(--blue);
    }

    .inline {
      display: inline;
      color: var(--green);
    }

    .output {
      white-space: pre-wrap;
      word-wrap: break-word;
      margin-bottom: 22px;
    }

    .cols {
      flex-direction: row;
      flex: 0 0 calc(50% - 15px);
      box-sizing: border-box;
      margin: 15px;
      float: left;
    }

    .row {
      margin-top: -45px;
    }

    .row:after {
      content: "";
      display: table;
      clear: both;
    }

    .blocks {
      font-size: 30;
    }

    a {
      text-decoration-thickness: 1px;
      font-weight: 500;
    }

    .input-color {
      position: relative;
    }

    .input-color input {
      padding-left: 20px;
    }

    .input-color .color-box {
      width: 10px;
      height: 10px;
      display: inline-block;
      background-color: #ccc;
      position: absolute;
      left: 5px;
      top: 5px;
    }
  </style>
</body>

</html>
